<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeepUp - Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="app.js" defer></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.98);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
    </style>
  </head>

  <body class="bg-[#0b0b0f] text-white">
    <header></header>

    <main class="p-4 md:p-10 animate-fade-in">
      <h2 class="text-3xl font-semibold mb-6">Blog</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div
          class="bg-[#12121a] p-4 rounded-xl border border-gray-800 transition-all hover:border-purple-500 hover:shadow-lg hover:shadow-purple-500/10 cursor-pointer"
        >
          <h3 class="font-semibold mb-2">Top 10 Shows</h3>
          <p class="text-gray-400 text-sm">Best trending shows this year.</p>
        </div>

        <div
          class="bg-[#12121a] p-4 rounded-xl border border-gray-800 transition-all hover:border-purple-500 hover:shadow-lg hover:shadow-purple-500/10 cursor-pointer"
        >
          <h3 class="font-semibold mb-2">Movie Reviews</h3>
          <p class="text-gray-400 text-sm">Latest reviews and ratings.</p>
        </div>
      </div>
    </main>

    <footer></footer>

    <script>
      // Page specific blog logic
    </script>
  </body>
</html>
